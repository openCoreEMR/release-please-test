# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Prefix policy (so release-please only cuts releases for runtime changes):
#   - Runtime deps  -> "fix(deps)"        => release-please bumps patch
#   - Dev deps      -> "chore(deps-dev)"  => no version bump (still in changelog)
#   - GitHub Actions / reusable workflows -> "chore(ci)" => no version bump
# Dropping `include: scope` because the new prefixes already encode the scope.

version: 2
updates:
# Monitor npm dependencies
- package-ecosystem: npm
  directory: /
  schedule:
    interval: daily
  labels:
  - dependencies
  - npm
  commit-message:
    prefix: fix(deps)
    prefix-development: chore(deps-dev)

# Monitor GitHub Actions
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: daily
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: chore(ci)
  groups:
    github-workflows-public:
      patterns:
        - "openCoreEMR/github-workflows-public/*"
    github-workflows-internal:
      patterns:
        - "openCoreEMR/github-workflows-internal/*"
