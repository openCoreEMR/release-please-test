name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: openCoreEMR/release-please-action@feat/annotated-tags-and-preview
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Summary
        env:
          RELEASES_CREATED: ${{ steps.release.outputs.releases_created }}
          PR: ${{ steps.release.outputs.pr }}
        run: |
          {
            echo "## Release Please Output"
            echo ""
            echo "releases_created: $RELEASES_CREATED"
            echo '```json'
            echo "$PR" | jq . 2>/dev/null || echo "$PR"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
