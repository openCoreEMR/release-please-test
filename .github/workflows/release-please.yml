name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: openCoreEMR/release-please-action@main
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Summary
        run: |
          echo "## Release Please Output" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "releases_created: ${{ steps.release.outputs.releases_created }}" >> "$GITHUB_STEP_SUMMARY"
          echo "pr: ${{ steps.release.outputs.pr }}" >> "$GITHUB_STEP_SUMMARY"
